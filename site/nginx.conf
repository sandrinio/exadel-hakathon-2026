server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Single-page-friendly: fall back to index.html for unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for hashed assets (Astro emits content-hashed filenames)
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Short cache for non-hashed assets
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # Gzip
  gzip on;
  gzip_types text/css application/javascript image/svg+xml application/xml application/json;
  gzip_min_length 1024;

  # Security
  add_header X-Content-Type-Options "nosniff";
  add_header Referrer-Policy "strict-origin-when-cross-origin";
}
